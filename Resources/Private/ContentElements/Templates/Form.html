<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="Main">
    <div class="max-w-7xl mx-auto p-6 md:p-8">

        {f:render(partial: 'Header', arguments: _all)}

        <f:if condition="{data.bodytext}">
            <div class="mb-6 text-gray-700">
                {data.bodytext -> f:format.html()}
            </div>
        </f:if>

        <form class="bg-white shadow-lg rounded-lg p-8" method="post" action="{data.header_link}" novalidate>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="flex flex-col">
                    <label for="form-name-{data.uid}" class="text-sm font-semibold text-gray-700 mb-2">
                        <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.name" default="Name" />
                        <span class="text-red-600">*</span>
                    </label>
                    <input
                        type="text"
                        id="form-name-{data.uid}"
                        name="name"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
                        required
                        placeholder="{f:translate(key: 'LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.name.placeholder', default: 'Ihr Name')}"
                    />
                </div>

                <div class="flex flex-col">
                    <label for="form-email-{data.uid}" class="text-sm font-semibold text-gray-700 mb-2">
                        <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.email" default="E-Mail" />
                        <span class="text-red-600">*</span>
                    </label>
                    <input
                        type="email"
                        id="form-email-{data.uid}"
                        name="email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
                        required
                        placeholder="{f:translate(key: 'LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.email.placeholder', default: 'ihre.email@beispiel.de')}"
                    />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="flex flex-col">
                    <label for="form-phone-{data.uid}" class="text-sm font-semibold text-gray-700 mb-2">
                        <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.phone" default="Telefon" />
                    </label>
                    <input
                        type="tel"
                        id="form-phone-{data.uid}"
                        name="phone"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
                        placeholder="{f:translate(key: 'LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.phone.placeholder', default: '+49 123 456789')}"
                    />
                </div>

                <div class="flex flex-col">
                    <label for="form-subject-{data.uid}" class="text-sm font-semibold text-gray-700 mb-2">
                        <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.subject" default="Betreff" />
                        <span class="text-red-600">*</span>
                    </label>
                    <input
                        type="text"
                        id="form-subject-{data.uid}"
                        name="subject"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
                        required
                        placeholder="{f:translate(key: 'LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.subject.placeholder', default: 'Worum geht es?')}"
                    />
                </div>
            </div>

            <div class="flex flex-col mb-6">
                <label for="form-message-{data.uid}" class="text-sm font-semibold text-gray-700 mb-2">
                    <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.message" default="Nachricht" />
                    <span class="text-red-600">*</span>
                </label>
                <textarea
                    id="form-message-{data.uid}"
                    name="message"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition resize-vertical"
                    rows="6"
                    required
                    placeholder="{f:translate(key: 'LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.message.placeholder', default: 'Ihre Nachricht an uns...')}"
                ></textarea>
            </div>

            <div class="flex items-start mb-6">
                <input
                    type="checkbox"
                    id="form-privacy-{data.uid}"
                    name="privacy"
                    class="w-4 h-4 text-red-600 border-gray-300 rounded focus:ring-red-600 mt-1"
                    required
                />
                <label for="form-privacy-{data.uid}" class="ml-2 text-sm text-gray-700">
                    <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.privacy" default="Ich habe die Datenschutzerklärung gelesen und akzeptiert" />
                    <span class="text-red-600">*</span>
                </label>
            </div>

            <div class="flex gap-4 flex-wrap">
                <button type="submit" class="px-8 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition-all duration-200 shadow-md hover:shadow-lg">
                    <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.submit" default="Absenden" />
                </button>
                <button type="reset" class="px-8 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition-all duration-200">
                    <f:translate key="LLL:EXT:salsa123_cms/Resources/Private/Language/locallang.xlf:form.reset" default="Zurücksetzen" />
                </button>
            </div>

            <input type="hidden" name="formtype" value="contact" />
        </form>

    </div>
</f:section>

</html>
